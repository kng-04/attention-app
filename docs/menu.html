<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>Menu Page</title>
  <link rel="stylesheet" href="./index.css" />
  <script defer src="./menu.js"></script>
</head>

<body data-access-code="JCB1314">
  <div class="header-row">
    <h1>📋 Menu</h1>
    <button id="backBtn" class="back-btn">
      <img src="./assets/home.png" alt="Home icon" class="back-icon" />
      <span>Back to Home</span>
    </button>
  </div>

  <div class="button-grid">
    <button class="emoji-btn text-btn"><span>Text Me</span></button>
    <button class="emoji-btn call-btn"><span>Call Me</span></button>
    <button class="emoji-btn hug-btn"><span>Cuddles Please</span></button>
    <button class="emoji-btn food-btn"><span>I'm Hungry</span></button>
    <button class="emoji-btn time-btn">
      <span>Weekly Time Sheet</span>
      <img src="./assets/time.png" alt="Clock icon" class="time-icon" />
    </button>
  </div>

  <div id="accessOverlay" class="access-overlay hidden">
    <div class="access-card">
      <h2>Access Required</h2>
      <p>Enter the access code you received to open the menu.</p>
      <p>Contact Simple Ng for access code</p>
      <form id="accessForm">
        <input type="password" id="accessInput" placeholder="Access code" autocomplete="off" required />
        <button type="submit">Unlock</button>
      </form>
      <p id="accessError" class="access-error"></p>
    </div>
  </div>
</body>

</html>
